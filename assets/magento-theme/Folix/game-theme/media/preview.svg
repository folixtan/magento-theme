<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2"/>
      <stop offset="100%" style="stop-color:#6C5CE7"/>
    </linearGradient>
    <linearGradient id="secondaryGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#EA580C"/>
    </linearGradient>
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC"/>
      <stop offset="100%" style="stop-color:#E2E8F0"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="600" fill="url(#bgGradient)"/>
  
  <!-- 头部区域 -->
  <rect y="0" width="800" height="120" fill="#FFFFFF"/>
  <rect y="0" width="800" height="3" fill="url(#secondaryGradient)"/>
  
  <!-- Top Bar -->
  <rect y="0" width="800" height="35" fill="url(#darkGradient)"/>
  
  <!-- Logo区域 -->
  <rect x="30" y="50" width="100" height="30" rx="4" fill="url(#primaryGradient)"/>
  <text x="50" y="72" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">FOLIX</text>
  
  <!-- 搜索框 -->
  <rect x="200" y="55" width="300" height="24" rx="4" fill="#F1F5F9" stroke="#E2E8F0"/>
  <circle cx="480" cy="67" r="8" fill="url(#secondaryGradient)"/>
  
  <!-- 登录按钮 -->
  <rect x="520" y="52" width="80" height="28" rx="6" fill="url(#primaryGradient)"/>
  <text x="540" y="71" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">登录</text>
  
  <!-- 购物车图标 -->
  <rect x="620" y="55" width="30" height="24" rx="4" fill="#F1F5F9"/>
  
  <!-- Hero Slider区域 -->
  <rect x="20" y="130" width="760" height="180" rx="12" fill="url(#primaryGradient)"/>
  <rect x="20" y="130" width="760" height="180" rx="12" fill="rgba(0,0,0,0.3)"/>
  
  <!-- Slider内容 -->
  <rect x="280" y="160" width="80" height="20" rx="10" fill="url(#secondaryGradient)"/>
  <text x="295" y="175" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF">限时特惠</text>
  
  <text x="180" y="210" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">Mobile Legends 钻石充值</text>
  <text x="250" y="240" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.9)">直充模式，5分钟快速到账</text>
  <text x="330" y="275" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFD700">¥98.00 起</text>
  
  <!-- Slider Dots -->
  <circle cx="370" cy="290" r="5" fill="#FFFFFF"/>
  <circle cx="385" cy="290" r="5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="400" cy="290" r="5" fill="rgba(255,255,255,0.5)"/>
  
  <!-- 产品卡片区域 -->
