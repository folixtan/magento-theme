  <!-- 产品卡片1 -->
  <rect x="30" y="360" width="175" height="200" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  <rect x="30" y="360" width="175" height="100" rx="8" fill="url(#primaryGradient)"/>
  <rect x="165" y="370" width="35" height="16" rx="8" fill="url(#secondaryGradient)"/>
  <text x="173" y="382" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF">直充</text>
  <text x="45" y="485" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1E293B">ML 钻石</text>
  <text x="45" y="510" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FF6B35">¥98.00</text>
  <rect x="45" y="520" width="145" height="28" rx="6" fill="url(#primaryGradient)"/>
  <text x="85" y="538" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF">立即购买</text>
  
  <!-- 产品卡片2 -->
  <rect x="220" y="360" width="175" height="200" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  <rect x="220" y="360" width="175" height="100" rx="8" fill="url(#secondaryGradient)"/>
  <rect x="355" y="370" width="35" height="16" rx="8" fill="#10B981"/>
  <text x="365" y="382" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF">卡密</text>
  <text x="235" y="485" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1E293B">PUBG UC</text>
  <text x="235" y="510" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FF6B35">¥198.00</text>
  <rect x="235" y="520" width="145" height="28" rx="6" fill="url(#primaryGradient)"/>
  <text x="275" y="538" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF">立即购买</text>
  
  <!-- 产品卡片3 -->
  <rect x="410" y="360" width="175" height="200" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  <rect x="410" y="360" width="175" height="100" rx="8" fill="#10B981"/>
  <rect x="545" y="370" width="35" height="16" rx="8" fill="url(#primaryGradient)"/>
  <text x="555" y="382" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF">直充</text>
  <text x="425" y="485" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1E293B">VIP 月卡</text>
  <text x="425" y="510" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FF6B35">¥298.00</text>
  <rect x="425" y="520" width="145" height="28" rx="6" fill="url(#primaryGradient)"/>
  <text x="465" y="538" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF">立即购买</text>
  
  <!-- 产品卡片4 -->
  <rect x="600" y="360" width="175" height="200" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  <rect x="600" y="360" width="175" height="100" rx="8" fill="#8B5CF6"/>
  <rect x="735" y="370" width="35" height="16" rx="8" fill="#8B5CF6"/>
  <text x="745" y="382" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF">新品</text>
  <text x="615" y="485" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1E293B">游戏点卡</text>
  <text x="615" y="510" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FF6B35">¥100.00</text>
  <rect x="615" y="520" width="145" height="28" rx="6" fill="#E2E8F0"/>
  <text x="660" y="538" font-family="Arial, sans-serif" font-size="10" fill="#64748B">暂时缺货</text>
  
  <!-- 尾部区域 -->
  <rect y="570" width="800" height="30" fill="url(#darkGradient)"/>
  <text x="400" y="588" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">© 2026 Folix Game. Powered by Magento</text>
</svg>
