<!--
/**
 * Folix One Step Checkout - Place Order Button Template
 * 
 * 放在 payment afterMethods region 中
 */
-->
<div class="folix-place-order actions-toolbar">
    <!-- 错误消息 -->
    <div class="message message-error error" data-bind="foreach: messageContainer().messages">
        <span data-bind="text: $data.text"></span>
    </div>
    
    <!-- Place Order 按钮 -->
    <div class="primary">
        <button type="submit"
                id="folix-place-order-btn"
                class="action primary checkout"
                data-bind="
                    click: placeOrder,
                    attr: { title: $t('Place Order') },
                    enable: isPaymentSelected()
                ">
            <span data-bind="i18n: 'Place Order'"></span>
        </button>
    </div>
</div>
